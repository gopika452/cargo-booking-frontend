<h3>Create Cargo Booking</h3>

<input [(ngModel)]="awb" placeholder="AWB" />
<input [(ngModel)]="origin" placeholder="Origin" />
<input [(ngModel)]="destination" placeholder="Destination" />
<input [(ngModel)]="weight" type="number" placeholder="Weight" />

<button (click)="submitBooking()">Submit</button>

<p *ngIf="message" style="color:green">{{ message }}</p>
<p *ngIf="error" style="color:red">{{ error }}</p>
